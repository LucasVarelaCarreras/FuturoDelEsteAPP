<!-- @dsCard group="Social" viewport="1080x1080" name="Cita / aniversario" subtitle="White card on brand background with logo lockup" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;}
  .post{width:1080px;height:1080px;position:relative;overflow:hidden;background:var(--fde-cyan);font-family:var(--font-sans);display:flex;align-items:center;justify-content:center;}
  .deco{position:absolute;border-radius:50%;border:3px solid rgba(255,255,255,.25);}
  .card{position:relative;width:760px;background:#fff;border-radius:46px;padding:80px 70px;text-align:center;box-shadow:0 40px 90px rgba(1,80,110,.35);}
  .mark{width:150px;height:150px;border-radius:50%;margin:0 auto 30px;display:block;}
  .num{font-family:var(--font-display);font-weight:700;font-size:120px;line-height:.9;color:var(--fde-cyan);}
  .label{font-family:var(--font-display);font-weight:600;text-transform:uppercase;letter-spacing:.16em;font-size:34px;color:var(--fde-ocean);margin-top:6px;}
  .quote{font-family:var(--font-accent);font-style:italic;font-size:40px;line-height:1.4;color:var(--text-body);margin-top:34px;}
  .wm{margin-top:44px;font-weight:800;font-size:30px;letter-spacing:.18em;color:var(--fde-navy);}
</style></head><body>
<div class="post">
  <div class="deco" style="width:520px;height:520px;top:-160px;left:-160px;"></div>
  <div class="deco" style="width:680px;height:680px;bottom:-260px;right:-220px;"></div>
  <div class="card">
    <img class="mark" src="../assets/logo-mark.png" alt="">
    <div class="num">48°</div>
    <div class="label">Aniversario</div>
    <div class="quote">"Celebramos años de trayectoria y compromiso con la inclusión y la accesibilidad."</div>
    <div class="wm">FUTURO DEL ESTE</div>
  </div>
</div>
</body></html>
