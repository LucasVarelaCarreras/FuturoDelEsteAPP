<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="Modular scale from 12 to 76px" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px 26px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px solid var(--border-subtle);}
  .row:last-child{border:none;}
  .lbl{font-family:var(--font-display);font-size:11px;letter-spacing:.06em;color:var(--text-muted);width:120px;flex-shrink:0;text-transform:uppercase;}
  .sample{color:var(--text-heading);font-weight:800;line-height:1;white-space:nowrap;}
</style></head><body>
  <div class="row"><span class="lbl">4xl · 48</span><span class="sample" style="font-size:48px;">Futuro</span></div>
  <div class="row"><span class="lbl">3xl · 38</span><span class="sample" style="font-size:38px;">Futuro del Este</span></div>
  <div class="row"><span class="lbl">2xl · 30</span><span class="sample" style="font-size:30px;">Sustentabilidad</span></div>
  <div class="row"><span class="lbl">xl · 24</span><span class="sample" style="font-size:24px;">Accesibilidad e inclusión</span></div>
  <div class="row"><span class="lbl">lg · 20</span><span class="sample" style="font-size:20px;font-weight:600;">Quiénes somos</span></div>
  <div class="row"><span class="lbl">base · 16</span><span class="sample" style="font-size:16px;font-weight:400;color:var(--text-body);">Cuerpo de texto para lectura</span></div>
  <div class="row"><span class="lbl">sm · 14</span><span class="sample" style="font-size:14px;font-weight:400;color:var(--text-muted);">Texto secundario y notas</span></div>
</body></html>
