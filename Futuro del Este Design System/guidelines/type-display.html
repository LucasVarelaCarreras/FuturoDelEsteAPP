<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;background:var(--surface-card);}

</style></head><body>
  <div class="eyebrow">Día Mundial del Medio Ambiente</div>
