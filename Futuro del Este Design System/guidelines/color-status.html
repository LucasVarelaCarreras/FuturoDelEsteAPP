<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="Semantic feedback — success, warning, danger, info" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:64px;border-radius:12px;}
  .name{font-size:12px;font-weight:700;color:var(--text-heading);margin-top:8px;}
  .hex{font-size:11px;color:var(--text-muted);font-family:var(--font-display);letter-spacing:.04em;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--fde-success)"></div><div class="name">Success</div><div class="hex">#1E9E6A</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-warning)"></div><div class="name">Warning</div><div class="hex">#E8A21C</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-danger)"></div><div class="name">Danger</div><div class="hex">#D9534F</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-info)"></div><div class="name">Info</div><div class="hex">#019AC4</div></div>
</div>
</body></html>
