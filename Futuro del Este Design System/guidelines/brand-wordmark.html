<!-- @dsCard group="Brand" viewport="700x230" name="Wordmark & tagline" subtitle="Logo lockup, wordmark construction and tagline" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;background:var(--surface-card);font-family:var(--font-sans);display:flex;gap:40px;align-items:center;}
  .lockup{display:flex;align-items:center;gap:18px;}
  .mark{width:84px;height:84px;border-radius:50%;display:block;}
  .word{display:flex;flex-direction:column;line-height:1;text-transform:uppercase;}
  .word .top{font-size:15px;font-weight:500;letter-spacing:.18em;color:var(--fde-navy);opacity:.85;}
  .word .main{font-size:30px;font-weight:800;letter-spacing:.04em;color:var(--fde-navy);}
  .word .main .del{font-weight:500;color:var(--fde-cyan);}
  .tag{margin-top:10px;font-family:var(--font-display);font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--color-primary);font-size:15px;}
  .divider{width:1px;align-self:stretch;background:var(--border-subtle);}
  .note{max-width:230px;font-size:13px;color:var(--text-muted);line-height:1.5;}
  .note b{color:var(--text-heading);}
</style></head><body>
  <div>
    <div class="lockup">
      <img class="mark" src="../assets/logo-mark.png" alt="Futuro del Este">
      <div class="word">
        <span class="top">Fundación</span>
        <span class="main">Futuro<span class="del">del</span>Este</span>
        <span class="tag">Sustentabilidad + Accesibilidad</span>
      </div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="note"><b>Clear space:</b> keep at least the height of the mark's inner wave around the lockup. Never recolor the mark; place it on white or over the deep gradient with the white wordmark.</div>
</body></html>
