<!-- @dsCard group="Colors" viewport="700x180" name="Brand wave ramp" subtitle="The signature ocean wave — emerald through deep ocean" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:74px;border-radius:14px;box-shadow:var(--shadow-xs);}
  .name{font-size:12px;font-weight:700;color:var(--text-heading);margin-top:8px;}
  .hex{font-size:11px;color:var(--text-muted);font-family:var(--font-display);letter-spacing:.04em;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--fde-emerald)"></div><div class="name">Emerald</div><div class="hex">#01B8A4</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-aqua)"></div><div class="name">Aqua</div><div class="hex">#1DC9C9</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-cyan)"></div><div class="name">Cyan</div><div class="hex">#019AC4</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-blue)"></div><div class="name">Blue</div><div class="hex">#0397CD</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-ocean)"></div><div class="name">Ocean</div><div class="hex">#01608F</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-navy)"></div><div class="name">Navy</div><div class="hex">#133B5C</div></div>
</div>
</body></html>
