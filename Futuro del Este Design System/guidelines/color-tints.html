<!-- @dsCard group="Colors" viewport="700x150" name="Tints & washes" subtitle="Soft surface fills for backgrounds and badges" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:56px;border-radius:12px;border:1px solid var(--border-subtle);}
  .name{font-size:11px;font-weight:700;color:var(--text-heading);margin-top:8px;}
  .hex{font-size:10px;color:var(--text-muted);font-family:var(--font-display);letter-spacing:.04em;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--fde-emerald-50)"></div><div class="name">Emerald 50</div><div class="hex">#E6F8F5</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-aqua-50)"></div><div class="name">Aqua 50</div><div class="hex">#E4FAFA</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-cyan-50)"></div><div class="name">Cyan 50</div><div class="hex">#E2F3F9</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-cyan-100)"></div><div class="name">Cyan 100</div><div class="hex">#C2E6F1</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-ocean-50)"></div><div class="name">Ocean 50</div><div class="hex">#E1ECF2</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-emerald-100)"></div><div class="name">Emerald 100</div><div class="hex">#C9F0EA</div></div>
</div>
</body></html>
