<!-- @dsCard group="Colors" viewport="700x180" name="Wave gradients" subtitle="The brand gradient — full, soft, and deep" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;gap:14px;}
  .sw{flex:1;}
  .chip{height:84px;border-radius:16px;box-shadow:var(--shadow-sm);}
  .name{font-size:12px;font-weight:700;color:var(--text-heading);margin-top:8px;}
  .var{font-size:11px;color:var(--text-muted);font-family:var(--font-display);letter-spacing:.03em;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--gradient-wave)"></div><div class="name">Wave</div><div class="var">--gradient-wave</div></div>
  <div class="sw"><div class="chip" style="background:var(--gradient-wave-soft)"></div><div class="name">Wave soft</div><div class="var">--gradient-wave-soft</div></div>
  <div class="sw"><div class="chip" style="background:var(--gradient-deep)"></div><div class="name">Deep</div><div class="var">--gradient-deep</div></div>
</div>
</body></html>
