<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals" subtitle="Cool-leaning grays for text, surfaces and lines" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;gap:12px;}
  .sw{flex:1;}
  .chip{height:56px;border-radius:12px;border:1px solid var(--border-subtle);}
  .name{font-size:11px;font-weight:700;color:var(--text-heading);margin-top:8px;}
  .hex{font-size:10px;color:var(--text-muted);font-family:var(--font-display);letter-spacing:.04em;}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--fde-paper)"></div><div class="name">Paper</div><div class="hex">#F4F8FA</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-mist)"></div><div class="name">Mist</div><div class="hex">#E9F0F3</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-line)"></div><div class="name">Line</div><div class="hex">#D5E1E7</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-gray-400)"></div><div class="name">Gray 400</div><div class="hex">#90A6B0</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-slate)"></div><div class="name">Slate</div><div class="hex">#5C7682</div></div>
  <div class="sw"><div class="chip" style="background:var(--fde-ink)"></div><div class="name">Ink</div><div class="hex">#112532</div></div>
</div>
</body></html>
