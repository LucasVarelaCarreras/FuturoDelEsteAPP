<!-- @dsCard group="Social" viewport="1080x1080" name="Efeméride" subtitle="Awareness-day post — split label + statement" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;}
  .post{width:1080px;height:1080px;position:relative;overflow:hidden;background:var(--surface-card);font-family:var(--font-sans);display:flex;flex-direction:column;}
  .band{background:var(--gradient-deep);color:#fff;padding:84px 78px 70px;position:relative;}
  .day{font-family:var(--font-display);font-weight:700;font-size:150px;line-height:.9;color:var(--fde-aqua);}
  .day small{display:block;font-size:40px;font-weight:600;letter-spacing:.1em;color:#fff;text-transform:uppercase;}
  h1{font-size:88px;font-weight:800;line-height:1.0;margin:26px 0 0;color:#fff;max-width:780px;}
  .body{flex:1;padding:64px 78px;display:flex;flex-direction:column;justify-content:space-between;}
  .quote{font-family:var(--font-accent);font-style:italic;font-size:50px;line-height:1.32;color:var(--fde-ocean);max-width:880px;}
  .foot{display:flex;align-items:center;gap:22px;}
  .mark{width:96px;height:96px;border-radius:50%;}
  .wm{font-weight:800;font-size:34px;letter-spacing:.04em;color:var(--fde-navy);}
  .wm small{display:block;font-weight:500;font-size:22px;letter-spacing:.2em;color:var(--fde-cyan);}
  .wave{position:absolute;left:0;right:0;bottom:-2px;height:90px;}
</style></head><body>
<div class="post">
  <div class="band">
    <div class="day"><small>05 Junio</small>Día Mundial</div>
    <h1>del Medio Ambiente</h1>
    <svg class="wave" viewBox="0 0 1080 90" preserveAspectRatio="none"><path d="M0,40 C260,95 520,5 760,45 C940,75 1020,30 1080,50 L1080,90 L0,90Z" fill="#fff"/></svg>
  </div>
  <div class="body">
    <div class="quote">"Buscamos naturalizar el cuidado ambiental del impacto que provoca cualquier intervención."</div>
    <div class="foot">
      <img class="mark" src="../assets/logo-mark.png" alt="">
      <div class="wm">FUTURO<small>DEL ESTE</small></div>
    </div>
  </div>
</div>
</body></html>
