<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;}
  .post{width:1080px;height:1080px;position:relative;overflow:hidden;background:var(--gradient-wave);font-family:var(--font-sans);}
  .photo{position:absolute;inset:0;background:linear-gradient(135deg,#0A4A6B,#019AC4);opacity:.55;}
  .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(19,59,92,.15),rgba(19,59,92,.7));}
  .content{position:absolute;inset:0;padding:78px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;}
  .top{display:flex;justify-content:space-between;align-items:flex-start;}
  .kicker{font-family:var(--font-display);text-transform:uppercase;letter-spacing:.14em;font-weight:600;font-size:30px;background:rgba(255,255,255,.16);padding:14px 26px;border-radius:999px;}
  .date{background:#fff;color:var(--fde-ocean);border-radius:24px;text-align:center;padding:22px 30px;line-height:1;}
  .date .d{font-family:var(--font-display);font-weight:700;font-size:74px;}
  .date .m{font-family:var(--font-display);font-weight:600;text-transform:uppercase;letter-spacing:.12em;font-size:28px;}
  h1{font-size:104px;font-weight:800;line-height:.98;letter-spacing:-.01em;margin:0;color:#fff;max-width:820px;}
  .sub{font-family:var(--font-accent);font-style:italic;font-size:40px;margin-top:24px;color:rgba(255,255,255,.92);}
  .foot{display:flex;align-items:center;gap:20px;}
  .mark{width:92px;height:92px;border-radius:50%;}
  .free{margin-left:auto;font-weight:800;font-size:30px;background:var(--fde-aqua);color:var(--fde-navy);padding:16px 30px;border-radius:999px;}
</style></head><body>
<div class="post">
  <div class="photo"></div><div class="veil"></div>
  <div class="content">
    <div class="top">
      <span class="kicker">Deporte adaptado</span>
      <div class="date"><div class="d">13</div><div class="m">Junio</div></div>
    </div>
    <div>
      <h1>Esgrima Olímpica y Paralímpica</h1>
      <div class="sub">Abierto a todo público, con o sin experiencia previa.</div>
    </div>
    <div class="foot">
      <img class="mark" src="../assets/logo-mark.png" alt="">
      <div style="font-weight:800;font-size:30px;letter-spacing:.04em;">FUTURO DEL ESTE</div>
      <span class="free">Entrada gratuita</span>
    </div>
  </div>
</div>
</body></html>
