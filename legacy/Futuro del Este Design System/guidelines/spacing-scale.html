<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base — breathable, airy layouts" -->
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px 26px;background:var(--surface-card);font-family:var(--font-sans);}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
  .bar{height:18px;background:var(--gradient-wave);border-radius:5px;}
  .lbl{font-family:var(--font-display);font-size:12px;color:var(--text-muted);width:90px;letter-spacing:.04em;}
</style></head><body>
  <div class="row"><span class="lbl">1 · 4px</span><div class="bar" style="width:4px;"></div></div>
  <div class="row"><span class="lbl">2 · 8px</span><div class="bar" style="width:8px;"></div></div>
  <div class="row"><span class="lbl">3 · 12px</span><div class="bar" style="width:12px;"></div></div>
  <div class="row"><span class="lbl">4 · 16px</span><div class="bar" style="width:16px;"></div></div>
  <div class="row"><span class="lbl">5 · 24px</span><div class="bar" style="width:24px;"></div></div>
  <div class="row"><span class="lbl">6 · 32px</span><div class="bar" style="width:32px;"></div></div>
  <div class="row"><span class="lbl">7 · 40px</span><div class="bar" style="width:40px;"></div></div>
  <div class="row"><span class="lbl">8 · 48px</span><div class="bar" style="width:48px;"></div></div>
  <div class="row"><span class="lbl">9 · 64px</span><div class="bar" style="width:64px;"></div></div>
</body></html>
