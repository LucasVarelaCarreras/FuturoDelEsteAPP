document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Oswald';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"9336716e-713f-4999-b23d-68a7add1c2ab\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --emerald:#01B8A4;--aqua:#1DC9C9;--cyan:#019AC4;--blue:#0397CD;--ocean:#01608F;--pine:#018176;--navy:#133B5C;\n    --paper:#F4F8FA;--mist:#E9F0F3;--line:#D5E1E7;--slate:#5C7682;--slate7:#3A535F;--ink:#112532;\n    --wave:linear-gradient(135deg,#01B8A4 0%,#1DC9C9 28%,#019AC4 60%,#0397CD 78%,#01608F 100%);\n    --deep:linear-gradient(160deg,#01608F 0%,#133B5C 100%);\n    --sans:'Mulish',system-ui,sans-serif;--disp:'Oswald','Arial Narrow',sans-serif;--serif:'Lora',Georgia,serif;--mono:'JetBrains Mono',monospace;\n  }\n  *{box-sizing:border-box;}\n  body{margin:0;font-family:var(--sans);color:var(--slate7);background:var(--mist);line-height:1.6;-webkit-font-smoothing:antialiased;}\n  .page{max-width:920px;margin:0 auto;background:#fff;}\n  section{padding:54px 64px;border-bottom:1px solid var(--line);}\n  .eyebrow{font-family:var(--disp);text-transform:uppercase;letter-spacing:.14em;font-weight:600;font-size:13px;color:var(--cyan);margin:0 0 10px;}\n  h1{font-family:var(--sans);font-weight:800;color:var(--navy);letter-spacing:-.01em;line-height:1.06;margin:0;}\n  h2{font-family:var(--sans);font-weight:800;color:var(--navy);letter-spacing:-.01em;font-size:30px;margin:0 0 6px;}\n  h3{font-family:var(--sans);font-weight:800;color:var(--navy);font-size:19px;margin:26px 0 8px;}\n  h4{font-family:var(--disp);text-transform:uppercase;letter-spacing:.08em;font-size:13px;color:var(--slate);font-weight:600;margin:22px 0 10px;}\n  p{margin:0 0 12px;max-width:62ch;}\n  a{color:var(--cyan);}\n  code{font-family:var(--mono);font-size:.88em;background:var(--paper);border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--ocean);}\n  pre{font-family:var(--mono);font-size:13px;line-height:1.55;background:var(--navy);color:#DCEAF2;border-radius:12px;padding:18px 20px;overflow:auto;margin:10px 0 18px;}\n  pre .k{color:var(--aqua);} pre .s{color:#9FE5C8;} pre .c{color:#6F8C9B;}\n  ul{margin:0 0 12px;padding-left:20px;max-width:62ch;}\n  li{margin:4px 0;}\n  .lead{font-size:18px;color:var(--slate7);max-width:60ch;}\n  .quote{font-family:var(--serif);font-style:italic;font-size:19px;color:var(--ocean);border-left:3px solid var(--aqua);padding-left:18px;margin:14px 0;max-width:60ch;}\n\n  /* cover */\n  .cover{background:var(--deep);color:#fff;padding:72px 64px 64px;border-bottom:none;}\n  .cover h1{color:#fff;font-size:52px;}\n  .cover .mark{width:92px;height:92px;margin-bottom:26px;}\n  .cover .tag{font-size:24px;color:#fff;font-weight:800;margin-top:18px;}\n  .cover .tag b{color:var(--aqua);}\n  .cover .sub{color:rgba(255,255,255,.8);font-size:16px;margin-top:14px;max-width:60ch;}\n  .meta-row{display:flex;gap:30px;flex-wrap:wrap;margin-top:30px;font-size:13px;color:rgba(255,255,255,.7);}\n  .meta-row b{display:block;color:#fff;font-family:var(--disp);letter-spacing:.06em;text-transform:uppercase;font-size:11px;margin-bottom:3px;}\n\n  /* swatches */\n  .sw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:14px 0 6px;}\n  .sw{border:1px solid var(--line);border-radius:12px;overflow:hidden;}\n  .sw .chip{height:64px;}\n  .sw .info{padding:8px 12px;}\n  .sw .nm{font-weight:800;color:var(--navy);font-size:13px;}\n  .sw .hx{font-family:var(--mono);font-size:11px;color:var(--slate);}\n  .ramp{height:54px;border-radius:12px;background:var(--wave);margin:8px 0 4px;}\n\n  /* type specimen */\n  .spec{border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin:10px 0;}\n  .spec .lbl{font-family:var(--mono);font-size:11px;color:var(--slate);margin-top:6px;}\n\n  table{width:100%;border-collapse:collapse;margin:10px 0 16px;font-size:14px;}\n  th,td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--line);}\n  th{font-family:var(--disp);text-transform:uppercase;letter-spacing:.06em;font-size:11px;color:var(--slate);font-weight:600;}\n  td code{font-size:12px;}\n\n  .pill{display:inline-flex;align-items:center;gap:6px;font-weight:700;font-size:12px;border-radius:999px;padding:5px 12px;}\n  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:10px 0;}\n  .btn{display:inline-flex;align-items:center;font-family:var(--sans);font-weight:700;border-radius:999px;padding:11px 24px;font-size:15px;border:1.5px solid transparent;}\n\n  .note{background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--warning,#E8A21C);border-radius:10px;padding:14px 18px;margin:14px 0;font-size:14px;}\n  .note b{color:var(--navy);}\n\n  @media print{\n    body{background:#fff;} .page{max-width:none;}\n    section{padding:30px 36px;page-break-inside:avoid;}\n    .cover{padding:46px 36px;}\n    pre{background:#0e1f2c;}\n  }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<div class=\"page\">\n\n<!-- COVER -->\n<section class=\"cover\">\n  <svg class=\"mark\" viewBox=\"0 0 100 100\" xmlns=\"http://www.w3.org/2000/svg\">\n    <circle cx=\"50\" cy=\"50\" r=\"47\" fill=\"#0c2438\" stroke=\"#fff\" stroke-width=\"3\"><\u002Fcircle>\n    <clipPath id=\"cc\"><circle cx=\"50\" cy=\"50\" r=\"45\"><\u002Fcircle><\u002FclipPath>\n    <g clip-path=\"url(#cc)\">\n      <rect x=\"0\" y=\"0\" width=\"100\" height=\"100\" fill=\"#0e3f5e\"><\u002Frect>\n      <path d=\"M0,42 q16,-16 33,0 t33,0 t34,0 V100 H0 Z\" fill=\"#01B8A4\"><\u002Fpath>\n      <path d=\"M0,54 q16,-16 33,0 t33,0 t34,0 V100 H0 Z\" fill=\"#1DC9C9\"><\u002Fpath>\n      <path d=\"M0,66 q16,-16 33,0 t33,0 t34,0 V100 H0 Z\" fill=\"#019AC4\"><\u002Fpath>\n      <path d=\"M0,78 q16,-16 33,0 t33,0 t34,0 V100 H0 Z\" fill=\"#01608F\"><\u002Fpath>\n    <\u002Fg>\n  <\u002Fsvg>\n  <p class=\"eyebrow\" style=\"color:var(--aqua)\">Sistema de Diseño · Documento de referencia<\u002Fp>\n  <h1>Fundación Futuro del Este<\u002Fh1>\n  <div class=\"tag\">Sustentabilidad <b>+<\u002Fb> Accesibilidad<\u002Fdiv>\n  <p class=\"sub\">Identidad visual y verbal destilada del sitio web e Instagram de la fundación. Este documento reúne todo el sistema en un solo lugar para usarlo como guía de marca o como <b>prompt<\u002Fb> al diseñar nuevos productos (empezando por la app).<\u002Fp>\n  <div class=\"meta-row\">\n    <div><b>Región<\u002Fb>Este de Uruguay · Maldonado / Punta del Este<\u002Fdiv>\n    <div><b>Idioma<\u002Fb>Español rioplatense (voseo)<\u002Fdiv>\n    <div><b>Color primario<\u002Fb>Cyan #019AC4<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SOURCES -->\n<section>\n  <p class=\"eyebrow\">01 · Fuentes<\u002Fp>\n  <h2>De dónde sale este sistema<\u002Fh2>\n  <p>Reconstruido a partir del material provisto por el cliente. El sitio actual está hecho en Google Sites, por lo que no hay tokens ni código de diseño propietario — todo se derivó de los visuales y los assets de marca.<\u002Fp>\n  <ul>\n    <li><b>Web:<\u002Fb> <a href=\"https://www.futurodeleste.org\">futurodeleste.org<\u002Fa> (Inicio, Quiénes somos, Qué hacemos, Contactanos, Novedades, Colaborá)<\u002Fli>\n    <li><b>Instagram:<\u002Fb> <a href=\"https://www.instagram.com/futurodeleste/\">@futurodeleste<\u002Fa><\u002Fli>\n    <li><b>Assets:<\u002Fb> logo (marca de la ola), foto del hero, grilla de Instagram<\u002Fli>\n    <li>También enlazados: LinkedIn, Facebook, X, WhatsApp, video institucional en YouTube<\u002Fli>\n  <\u002Ful>\n<\u002Fsection>\n\n<!-- CONTENT -->\n<section>\n  <p class=\"eyebrow\">02 · Fundamentos de contenido<\u002Fp>\n  <h2>Voz y tono<\u002Fh2>\n  <p><b>Idioma:<\u002Fb> español rioplatense (Uruguay). Usa <b>voseo<\u002Fb> — “Sumate”, “Colaborá”, “Conocé”, “Contactanos” — nunca las formas de España (“Súmate / Colabora”).<\u002Fp>\n  <p><b>Voz:<\u002Fb> cálida, inclusiva, colectiva y esperanzadora. La fundación habla en <b>“nosotros”<\u002Fb> (“Queremos contribuir…”, “Buscamos naturalizar…”, “Brindamos experiencias…”) y se dirige al lector de forma informal (“vos”). Es una voz con propósito y llana — no corporativa, no académica, nunca solemne.<\u002Fp>\n  <h4>Vocabulario recurrente<\u002Fh4>\n  <p>sustentabilidad · accesibilidad · inclusión · discapacidad · cuidado ambiental · cambio cultural · naturalizar · concientizar · en alianza · comunidad · el Este<\u002Fp>\n  <h4>Mayúsculas<\u002Fh4>\n  <p>Titulares en sentence case o ALL CAPS para afiches/wordmark. El “+” de <i>Sustentabilidad + Accesibilidad<\u002Fi> es una firma — mantener los espacios alrededor.<\u002Fp>\n  <h4>Ejemplos de tono<\u002Fh4>\n  <ul>\n    <li><b>CTA:<\u002Fb> “Colaborá”, “Sumate al cambio”, “Confirmá tu asistencia”, “Ver todas las novedades”.<\u002Fli>\n    <li><b>Cuerpo:<\u002Fb> “En alianza con diversas instituciones locales, nacionales e internacionales, brindamos experiencias para ayudar a concientizar e incorporar aprendizajes sobre inclusión y sustentabilidad.”<\u002Fli>\n    <li><b>Afiche:<\u002Fb> “ENTRADA GRATUITA”, “48° ANIVERSARIO”, “DÍA MUNDIAL DEL MEDIO AMBIENTE”.<\u002Fli>\n  <\u002Ful>\n  <div class=\"quote\">“Queremos contribuir a generar un cambio cultural que permita incorporar, de forma orgánica, conceptos de sustentabilidad y accesibilidad en todos los proyectos.”<\u002Fdiv>\n  <p><b>Emoji:<\u002Fb> no forman parte de la marca formal en la web. Mantener mínimo y funcional en producto.<\u002Fp>\n<\u002Fsection>\n\n<!-- VISUAL -->\n<section>\n  <p class=\"eyebrow\">03 · Fundamentos visuales<\u002Fp>\n  <h2>El motivo: la ola<\u002Fh2>\n  <p>La identidad es una <b>ola oceánica<\u002Fb>: el logo es un círculo con bandas onduladas superpuestas que van del verde-azulado arriba al azul océano profundo abajo, separadas por finas líneas blancas. Esta ola “costera / del Este” se repite como divisores de sección, gradientes y acentos de tarjetas.<\u002Fp>\n  <table>\n    <tbody><tr><th>Aspecto<\u002Fth><th>Regla<\u002Fth><\u002Ftr>\n    <tr><td>Formas / radios<\u002Ftd><td>Suaves y redondeadas. Botones tipo <b>píldora<\u002Fb>; tarjetas con radios grandes (20px+); afiches sociales 40px+. Nada con esquinas filosas.<\u002Ftd><\u002Ftr>\n    <tr><td>Sombras<\u002Ftd><td>Suaves, bajo contraste, tinte frío <code>rgba(17,37,50,…)<\u002Fcode>. Glow cyan en botones primarios. Sin sombras negras ni duras.<\u002Ftd><\u002Ftr>\n    <tr><td>Bordes<\u002Ftd><td>Hairline 1px <code>#D5E1E7<\u002Fcode> en tarjetas; 1.5px en inputs; foco = borde cyan 2px + ring cyan suave.<\u002Ftd><\u002Ftr>\n    <tr><td>Movimiento<\u002Ftd><td>Calmo y gentil — fades y pequeños lifts, ease estándar, 140–400ms. <b>Sin bounce ni spring.<\u002Fb><\u002Ftd><\u002Ftr>\n    <tr><td>Estados<\u002Ftd><td>Hover = tono más oscuro del mismo color (nunca opacidad). Tarjetas suben −3px. Press = escala 0.97. Disabled = 50% opacidad.<\u002Ftd><\u002Ftr>\n    <tr><td>Fondos<\u002Ftd><td>(1) superficies blanco-frío limpias; (2) fotografía full-bleed con wash claro o navy; (3) color de marca / gradiente de ola. Sin ruido ni textura.<\u002Ftd><\u002Ftr>\n    <tr><td>Layout<\u002Ftd><td>Aireado, mucho espacio en blanco alrededor de la marca. Lockups centrados; contenido máx. 1200px; espaciado base 8px.<\u002Ftd><\u002Ftr>\n    <tr><td>Fotografía<\u002Ftd><td>Cálida-natural, espontánea, centrada en personas, exteriores, comunidad.<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- COLOR -->\n<section>\n  <p class=\"eyebrow\">04 · Color<\u002Fp>\n  <h2>Rampa de la ola<\u002Fh2>\n  <p>Una rampa fría azul-verde tomada directo del logo. <b>Cyan #019AC4<\u002Fb> es el color interactivo primario; el emerald es secundario. La tinta navy ancla wordmark y titulares.<\u002Fp>\n  <div class=\"ramp\"><\u002Fdiv>\n  <div class=\"sw-grid\">\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#01B8A4\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Emerald<\u002Fdiv><div class=\"hx\">#01B8A4<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#1DC9C9\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Aqua<\u002Fdiv><div class=\"hx\">#1DC9C9<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#019AC4\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Cyan · primario<\u002Fdiv><div class=\"hx\">#019AC4<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#0397CD\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Blue<\u002Fdiv><div class=\"hx\">#0397CD<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#01608F\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Ocean<\u002Fdiv><div class=\"hx\">#01608F<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#133B5C\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Navy · tinta<\u002Fdiv><div class=\"hx\">#133B5C<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <h4>Neutrales (fríos)<\u002Fh4>\n  <div class=\"sw-grid\">\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#F4F8FA\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Paper<\u002Fdiv><div class=\"hx\">#F4F8FA<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#E9F0F3\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Mist<\u002Fdiv><div class=\"hx\">#E9F0F3<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#D5E1E7\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Line<\u002Fdiv><div class=\"hx\">#D5E1E7<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#5C7682\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Slate · texto 2°<\u002Fdiv><div class=\"hx\">#5C7682<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#112532\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Ink · texto<\u002Fdiv><div class=\"hx\">#112532<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#018176\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Pine<\u002Fdiv><div class=\"hx\">#018176<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <h4>Estados semánticos<\u002Fh4>\n  <div class=\"sw-grid\">\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#1E9E6A\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Success<\u002Fdiv><div class=\"hx\">#1E9E6A<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#E8A21C\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Warning<\u002Fdiv><div class=\"hx\">#E8A21C<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"sw\"><div class=\"chip\" style=\"background:#D9534F\"><\u002Fdiv><div class=\"info\"><div class=\"nm\">Danger<\u002Fdiv><div class=\"hx\">#D9534F<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <h4>Gradientes<\u002Fh4>\n  <table>\n    <tbody><tr><td><code>--gradient-wave<\u002Fcode><\u002Ftd><td>135°: #01B8A4 → #1DC9C9 → #019AC4 → #0397CD → #01608F<\u002Ftd><\u002Ftr>\n    <tr><td><code>--gradient-deep<\u002Fcode><\u002Ftd><td>160°: #01608F → #133B5C (bandas/heros oscuros)<\u002Ftd><\u002Ftr>\n    <tr><td><code>--gradient-wave-soft<\u002Fcode><\u002Ftd><td>135°: #E6F8F5 → #E2F3F9 → #E1ECF2 (washes claros)<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- TYPE -->\n<section>\n  <p class=\"eyebrow\">05 · Tipografía<\u002Fp>\n  <h2>Tres familias<\u002Fh2>\n  <div class=\"spec\">\n    <div style=\"font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:42px;color:var(--navy);line-height:1;\">48° Aniversario<\u002Fdiv>\n    <div class=\"lbl\">DISPLAY — Oswald · condensada mayúsculas · 400/500/600/700 · tracking .02–.14em · afiches, numerales, eyebrows<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"spec\">\n    <div style=\"font-family:var(--sans);font-weight:800;letter-spacing:-.01em;font-size:34px;color:var(--navy);line-height:1.08;\">Sustentabilidad + Accesibilidad<\u002Fdiv>\n    <div class=\"lbl\">UI / BODY — Mulish · sans humanista · 800 titulares, 400/500/600 texto · tracking −.01em en titulares<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"spec\">\n    <div style=\"font-family:var(--serif);font-style:italic;font-weight:500;font-size:26px;color:var(--ocean);line-height:1.3;\">“Celebramos 48 años de compromiso con la inclusión.”<\u002Fdiv>\n    <div class=\"lbl\">ACENTO — Lora italic · serif transicional · captions, pull quotes, testimonios<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"note\"><b>⚠ Sustitución de fuentes:<\u002Fb> las fuentes reales de la marca no son de distribución pública; se mapearon a las más cercanas en Google Fonts (Oswald / Mulish / Lora). Si tenés los archivos reales, se reemplazan en <code>tokens/fonts.css<\u002Fcode>.<\u002Fdiv>\n  <h4>Escala tipográfica<\u002Fh4>\n  <table>\n    <tbody><tr><th>Token<\u002Fth><th>px<\u002Fth><th>Uso<\u002Fth><\u002Ftr>\n    <tr><td><code>--text-4xl<\u002Fcode><\u002Ftd><td>48<\u002Ftd><td>Hero / H1<\u002Ftd><\u002Ftr>\n    <tr><td><code>--text-3xl<\u002Fcode><\u002Ftd><td>38<\u002Ftd><td>H2 sección<\u002Ftd><\u002Ftr>\n    <tr><td><code>--text-2xl<\u002Fcode><\u002Ftd><td>30<\u002Ftd><td>Título de bloque<\u002Ftd><\u002Ftr>\n    <tr><td><code>--text-xl<\u002Fcode><\u002Ftd><td>24<\u002Ftd><td>H3<\u002Ftd><\u002Ftr>\n    <tr><td><code>--text-lg<\u002Fcode><\u002Ftd><td>20<\u002Ftd><td>Subtítulo / lead<\u002Ftd><\u002Ftr>\n    <tr><td><code>--text-base<\u002Fcode><\u002Ftd><td>16<\u002Ftd><td>Cuerpo<\u002Ftd><\u002Ftr>\n    <tr><td><code>--text-sm<\u002Fcode><\u002Ftd><td>14<\u002Ftd><td>Texto secundario<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- SPACING -->\n<section>\n  <p class=\"eyebrow\">06 · Espaciado, radios y sombras<\u002Fp>\n  <h2>Sistema de espaciado<\u002Fh2>\n  <p>Base 4px, grilla suave de 8px. Layouts generosos y aireados.<\u002Fp>\n  <table>\n    <tbody><tr><th>Escala<\u002Fth><th>Valor<\u002Fth><th>·<\u002Fth><th>Radio<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n    <tr><td>space-1<\u002Ftd><td>4px<\u002Ftd><td><\u002Ftd><td>radius-sm<\u002Ftd><td>8px<\u002Ftd><\u002Ftr>\n    <tr><td>space-2<\u002Ftd><td>8px<\u002Ftd><td><\u002Ftd><td>radius-md<\u002Ftd><td>14px<\u002Ftd><\u002Ftr>\n    <tr><td>space-4<\u002Ftd><td>16px<\u002Ftd><td><\u002Ftd><td>radius-lg · tarjetas<\u002Ftd><td>20px<\u002Ftd><\u002Ftr>\n    <tr><td>space-5<\u002Ftd><td>24px<\u002Ftd><td><\u002Ftd><td>radius-xl<\u002Ftd><td>28px<\u002Ftd><\u002Ftr>\n    <tr><td>space-6<\u002Ftd><td>32px<\u002Ftd><td><\u002Ftd><td>radius-pill · botones<\u002Ftd><td>999px<\u002Ftd><\u002Ftr>\n    <tr><td>space-9<\u002Ftd><td>64px<\u002Ftd><td><\u002Ftd><td>radius-circle<\u002Ftd><td>50%<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n  <h4>Sombras<\u002Fh4>\n  <table>\n    <tbody><tr><td><code>--shadow-sm<\u002Fcode><\u002Ftd><td>0 2px 8px rgba(17,37,50,.07)<\u002Ftd><td>tarjetas en reposo<\u002Ftd><\u002Ftr>\n    <tr><td><code>--shadow-lg<\u002Fcode><\u002Ftd><td>0 18px 48px rgba(17,37,50,.12)<\u002Ftd><td>hover / elevado<\u002Ftd><\u002Ftr>\n    <tr><td><code>--shadow-brand<\u002Fcode><\u002Ftd><td>0 12px 28px rgba(1,154,196,.28)<\u002Ftd><td>glow cyan en botón primario<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n<\u002Fsection>\n\n<!-- COMPONENTS -->\n<section>\n  <p class=\"eyebrow\">07 · Componentes<\u002Fp>\n  <h2>Primitivas de UI<\u002Fh2>\n  <p>Namespace en runtime: <code>window.FuturoDelEsteDesignSystem_&lt;hash&gt;<\u002Fcode>. Todas referencian las CSS custom properties; sin librerías externas.<\u002Fp>\n\n  <h3>Button<\u002Fh3>\n  <p>Botón CTA tipo píldora. Hover desplaza el color (nunca opacidad); press escala a 0.97.<\u002Fp>\n  <div class=\"row\">\n    <span class=\"btn\" style=\"background:#019AC4;color:#fff;box-shadow:0 12px 28px rgba(1,154,196,.28)\">Colaborá<\u002Fspan>\n    <span class=\"btn\" style=\"background:#01B8A4;color:#fff\">Sumate<\u002Fspan>\n    <span class=\"btn\" style=\"background:transparent;color:#019AC4;border-color:#019AC4\">Conocé más<\u002Fspan>\n    <span class=\"btn\" style=\"background:transparent;color:var(--navy)\">Cancelar<\u002Fspan>\n    <span class=\"btn\" style=\"background:#133B5C;color:#fff\">Contactanos<\u002Fspan>\n  <\u002Fdiv>\n  <pre><span class=\"c\">// variant: primary | secondary | outline | ghost | deep · size: sm | md | lg<\u002Fspan>\n<span class=\"k\">&lt;Button<\u002Fspan> variant=<span class=\"s\">\"primary\"<\u002Fspan> size=<span class=\"s\">\"md\"<\u002Fspan> onClick={save}<span class=\"k\">&gt;<\u002Fspan>Colaborá<span class=\"k\">&lt;/Button&gt;<\u002Fspan>\n<span class=\"k\">&lt;Button<\u002Fspan> variant=<span class=\"s\">\"outline\"<\u002Fspan> iconLeft={&lt;PlusIcon/&gt;} full<span class=\"k\">&gt;<\u002Fspan>Sumate<span class=\"k\">&lt;/Button&gt;<\u002Fspan><\u002Fpre>\n\n  <h3>Badge<\u002Fh3>\n  <p>Pill chico para estado, categoría, fecha o conteo.<\u002Fp>\n  <div class=\"row\">\n    <span class=\"pill\" style=\"background:#E2F3F9;color:#016684\">● Inscripción abierta<\u002Fspan>\n    <span class=\"pill\" style=\"background:#E6F8F5;color:#018176\">Sustentabilidad<\u002Fspan>\n    <span class=\"pill\" style=\"background:#01608F;color:#fff\">13 JUN<\u002Fspan>\n  <\u002Fdiv>\n  <pre><span class=\"c\">// tone: cyan | emerald | aqua | ocean | navy | success | warning<\u002Fspan>\n<span class=\"k\">&lt;Badge<\u002Fspan> tone=<span class=\"s\">\"emerald\"<\u002Fspan><span class=\"k\">&gt;<\u002Fspan>Sustentabilidad<span class=\"k\">&lt;/Badge&gt;<\u002Fspan>\n<span class=\"k\">&lt;Badge<\u002Fspan> tone=<span class=\"s\">\"cyan\"<\u002Fspan> dot<span class=\"k\">&gt;<\u002Fspan>Inscripción abierta<span class=\"k\">&lt;/Badge&gt;<\u002Fspan>\n<span class=\"k\">&lt;Badge<\u002Fspan> tone=<span class=\"s\">\"ocean\"<\u002Fspan> soft={false}<span class=\"k\">&gt;<\u002Fspan>13 JUN<span class=\"k\">&lt;/Badge&gt;<\u002Fspan><\u002Fpre>\n\n  <h3>Card<\u002Fh3>\n  <p>Superficie redondeada suave — contenedor base para features, novedades, stats y paneles. <code>accent<\u002Fcode> agrega la franja de ola arriba; <code>interactive<\u002Fcode> sube + profundiza sombra en hover.<\u002Fp>\n  <pre><span class=\"k\">&lt;Card<\u002Fspan> accent interactive padding=<span class=\"s\">\"lg\"<\u002Fspan><span class=\"k\">&gt;<\u002Fspan>\n  <span class=\"k\">&lt;Badge<\u002Fspan> tone=<span class=\"s\">\"emerald\"<\u002Fspan><span class=\"k\">&gt;<\u002Fspan>Novedades<span class=\"k\">&lt;/Badge&gt;<\u002Fspan>\n  <span class=\"k\">&lt;h3&gt;<\u002Fspan>Día Mundial del Medio Ambiente<span class=\"k\">&lt;/h3&gt;<\u002Fspan>\n<span class=\"k\">&lt;/Card&gt;<\u002Fspan><\u002Fpre>\n\n  <h3>Input<\u002Fh3>\n  <p>Campo de texto redondeado con label, hint/error y ring cyan calmo.<\u002Fp>\n  <pre><span class=\"k\">&lt;Input<\u002Fspan> label=<span class=\"s\">\"Email\"<\u002Fspan> type=<span class=\"s\">\"email\"<\u002Fspan> placeholder=<span class=\"s\">\"tu@correo.com\"<\u002Fspan> hint=<span class=\"s\">\"Te escribiremos pronto.\"<\u002Fspan> <span class=\"k\">/&gt;<\u002Fspan>\n<span class=\"k\">&lt;Input<\u002Fspan> label=<span class=\"s\">\"Nombre\"<\u002Fspan> error=<span class=\"s\">\"Este campo es obligatorio.\"<\u002Fspan> <span class=\"k\">/&gt;<\u002Fspan><\u002Fpre>\n\n  <h3>Logo &amp; WaveDivider<\u002Fh3>\n  <p><b>Logo<\u002Fb> — marca de la ola, opcionalmente con wordmark. Variantes: <code>mark<\u002Fcode>, <code>lockup<\u002Fcode> (apilado), <code>lockup-horizontal<\u002Fcode>; <code>tone=\"white\"<\u002Fcode> sobre fondos oscuros/foto. Nunca recolorear ni distorsionar la marca.<\u002Fp>\n  <p><b>WaveDivider<\u002Fb> — la ola firma como separador de sección o cap de hero. Props: <code>fill<\u002Fcode>, <code>gradient<\u002Fcode>, <code>height<\u002Fcode>, <code>flip<\u002Fcode>.<\u002Fp>\n  <pre><span class=\"k\">&lt;Logo<\u002Fspan> variant=<span class=\"s\">\"lockup\"<\u002Fspan> size={56} <span class=\"k\">/&gt;<\u002Fspan>\n<span class=\"k\">&lt;Logo<\u002Fspan> variant=<span class=\"s\">\"lockup\"<\u002Fspan> tone=<span class=\"s\">\"white\"<\u002Fspan> <span class=\"k\">/&gt;<\u002Fspan>  <span class=\"c\">// sobre marca/foto<\u002Fspan>\n<span class=\"k\">&lt;WaveDivider<\u002Fspan> gradient height={80} <span class=\"k\">/&gt;<\u002Fspan><\u002Fpre>\n<\u002Fsection>\n\n<!-- ICONOGRAPHY -->\n<section>\n  <p class=\"eyebrow\">08 · Iconografía<\u002Fp>\n  <h2>Enfoque de íconos<\u002Fh2>\n  <p>El sitio actual (Google Sites) no trae set de íconos propio — usa los glifos sociales por defecto y un chevron. No hay fuente de íconos propietaria.<\u002Fp>\n  <ul>\n    <li>El único asset de marca verdadero es la <b>marca de la ola<\u002Fb>. Tratarla como el glifo hero; nunca recolorear ni distorsionar.<\u002Fli>\n    <li>Para íconos de UI, usar un set <b>outline con caps/joins redondeados<\u002Fb> para acompañar la geometría suave — ej. <b>Lucide<\u002Fb> o <b>Phosphor (regular)<\u002Fb> por CDN. <i>Es una sustitución<\u002Fi> (la marca no tiene librería propia) — a confirmar con el cliente.<\u002Fli>\n    <li>Emoji solo como placeholder de wayfinding en el kit de app; reemplazar por el set elegido antes de producción.<\u002Fli>\n    <li>La ola decorativa (WaveDivider) es mobiliario de marca, no un ícono.<\u002Fli>\n  <\u002Ful>\n<\u002Fsection>\n\n<!-- CAVEATS -->\n<section>\n  <p class=\"eyebrow\">09 · Caveats / a confirmar<\u002Fp>\n  <h2>Sustituciones<\u002Fh2>\n  <div class=\"note\"><b>Fuentes:<\u002Fb> sustituciones por aproximación (Oswald / Mulish / Lora). Enviar los archivos reales para reemplazar.<\u002Fdiv>\n  <div class=\"note\"><b>Colores:<\u002Fb> muestreados del PNG del logo y la imaginería — precisos pero no de una spec oficial. Confirmar hexes exactos si existe un brand book.<\u002Fdiv>\n  <div class=\"note\"><b>App móvil:<\u002Fb> el kit es un <b>concepto<\u002Fb> diseñado desde la marca (la app aún no existe). Tratar como dirección de arranque, no spec.<\u002Fdiv>\n  <div class=\"note\"><b>Íconos:<\u002Fb> no existe set propio en el sitio; se recomienda Lucide/Phosphor (redondeados) — sustitución marcada.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- MANIFEST -->\n<section>\n  <p class=\"eyebrow\">10 · Índice del sistema<\u002Fp>\n  <h2>Qué incluye el proyecto<\u002Fh2>\n  <table>\n    <tbody><tr><th>Área<\u002Fth><th>Contenido<\u002Fth><\u002Ftr>\n    <tr><td>Fundaciones<\u002Ftd><td><code>styles.css<\u002Fcode> + <code>tokens/<\u002Fcode> (fonts, colors, typography, spacing, base)<\u002Ftd><\u002Ftr>\n    <tr><td>Componentes<\u002Ftd><td>Button, Badge, Card · Input · Logo, WaveDivider<\u002Ftd><\u002Ftr>\n    <tr><td>UI kit — Web<\u002Ftd><td>Homepage (Nav, Hero, Mission, News, Footer)<\u002Ftd><\u002Ftr>\n    <tr><td>UI kit — App<\u002Ftd><td>App concepto (Home, Event, Colaborá, Perfil + shell)<\u002Ftd><\u002Ftr>\n    <tr><td>Social<\u002Ftd><td>Templates de Instagram (evento, efeméride, cita/aniversario)<\u002Ftd><\u002Ftr>\n    <tr><td>Cards de fundación<\u002Ftd><td>22 specimens de color, tipo, espaciado y marca<\u002Ftd><\u002Ftr>\n    <tr><td>Skill<\u002Ftd><td><code>SKILL.md<\u002Fcode> — manifiesto portable de Agent Skill<\u002Ftd><\u002Ftr>\n  <\u002Ftbody><\u002Ftable>\n  <p style=\"margin-top:24px;color:var(--slate);font-size:13px;font-family:var(--mono)\">Fundación Futuro del Este · Sistema de Diseño · documento de referencia generado para uso como guía / prompt · futurodeleste.org<\u002Fp>\n<\u002Fsection>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
